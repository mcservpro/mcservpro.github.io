<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCServPro | Карманный сервер</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Unbounded', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        accent: {
                            DEFAULT: '#5483bb',
                            dim: 'rgba(84, 131, 187, 0.15)',
                        },
                        surface: {
                            light: '#ffffff',
                            dark: '#0a0a0f',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg: #f4f6f9;
            --bg-card: #ffffff;
            --fg: #1a1a2e;
            --fg-muted: #6b7280;
            --border: rgba(0, 0, 0, 0.08);
            --accent: #5483bb;
            --accent-dim: rgba(84, 131, 187, 0.12);
            --glow: rgba(84, 131, 187, 0.2);
        }
        
        .dark {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --fg: #e8e8ed;
            --fg-muted: #6b6b7a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5483bb;
            --accent-dim: rgba(84, 131, 187, 0.15);
            --glow: rgba(84, 131, 187, 0.3);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--fg);
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }
        
        .font-display {
            font-family: 'Unbounded', sans-serif;
        }
        
        /* Фоновый паттерн */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 20%, var(--glow) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(92, 124, 250, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .dark .bg-pattern {
            background-image: 
                radial-gradient(circle at 20% 20%, var(--glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(92, 124, 250, 0.08) 0%, transparent 40%);
        }
        
        /* Grid */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
        }
        
        /* Карточки */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .dark .card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        /* Кнопки */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #3d6a99);
            color: #ffffff;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(84, 131, 187, 0.4);
        }
        
        .btn-secondary {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .btn-secondary:hover {
            background: var(--accent);
            color: #ffffff;
        }
        
        .btn-android {
            background: linear-gradient(135deg, #3ddc84, #2ca05a);
            color: white;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(61, 220, 132, 0.3);
        }
        
        .btn-android:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(61, 220, 132, 0.4);
        }
        
        /* Hero изображение */
        .hero-image-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .hero-image-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(84, 131, 187, 0.1));
            pointer-events: none;
        }
        
        .hero-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Тогл темы */
        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--fg);
        }
        
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .theme-toggle svg {
            width: 22px;
            height: 22px;
            transition: transform 0.3s ease;
        }
        
        .theme-toggle:hover svg {
            transform: rotate(15deg);
        }
        
        /* Социальные иконки */
        .social-link {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-muted);
            transition: all 0.2s ease;
        }
        
        .social-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        
        .social-link.discord:hover {
            border-color: #5865F2;
            color: #5865F2;
        }
        
        .social-link.vk:hover {
            border-color: #0077FF;
            color: #0077FF;
        }
        
        /* Секция загрузок */
        .download-section {
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        .download-section:hover {
            border-color: rgba(84, 131, 187, 0.3);
        }
        
        /* Анимации */
        .fade-up {
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        
        /* Бейдж версии */
        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <script>
        // Инициализация темы
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        // Проверяем сохраненную тему
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.classList.toggle('dark', savedTheme === 'dark');
        } else {
            // По умолчанию темная тема
            body.classList.add('dark');
        }
        
        // Иконка
        function updateThemeIcon() {
            const isDark = body.classList.contains('dark');
            themeToggle.innerHTML = isDark 
                ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                     <circle cx="12" cy="12" r="5"></circle>
                     <line x1="12" y1="1" x2="12" y2="3"></line>
                     <line x1="12" y1="21" x2="12" y2="23"></line>
                     <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                     <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                     <line x1="1" y1="12" x2="3" y2="12"></line>
                     <line x1="21" y1="12" x2="23" y2="12"></line>
                     <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                     <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                   </svg>`
                : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                     <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                   </svg>`;
        }
        
        updateThemeIcon();
        
        // Переключение темы
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });
    </script>
